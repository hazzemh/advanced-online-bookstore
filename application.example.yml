spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bookstore_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  cache:
    # Use `simple` for local dev without Redis, or `redis` for multi-instance deployments.
    type: ${CACHE_TYPE:simple}
    redis:
      # Global TTL for all cache entries (you can tune later per cache if needed)
      time-to-live: ${CACHE_REDIS_TTL:10m}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid, profile, email
            # Default redirect is: {baseUrl}/login/oauth2/code/{registrationId}

jwt:
  secret: ${JWT_SECRET:change-me}
  expiration: ${JWT_EXPIRATION:86400000}

server:
  port: ${SERVER_PORT:8081}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  currency: ${STRIPE_CURRENCY:usd}

notifications:
  email:
    enabled: ${NOTIFICATIONS_EMAIL_ENABLED:false}

app:
  mail:
    from: ${APP_MAIL_FROM:no-reply@example.com}

