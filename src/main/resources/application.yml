spring:
  application:
    name: advanced-online-bookstore

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  cache:
    type: ${CACHE_TYPE:simple}
    redis:
      time-to-live: ${CACHE_REDIS_TTL:10m}

  # This repo includes Spring Session (Redis) on the classpath. Default to no external session store unless you
  # explicitly opt-in (e.g. for OAuth2 login across instances).
  session:
    store-type: ${SESSION_STORE_TYPE:none}

  data:
    redis:
      # If your provider gives you a single URL (often including auth/TLS), prefer that.
      url: ${REDIS_URL:}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid, profile, email

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

server:
  # Render injects PORT. Keep SERVER_PORT for local/docker-compose.
  port: ${PORT:${SERVER_PORT:8081}}

internal:
  api:
    token: ${INTERNAL_API_TOKEN:}

app:
  upload:
    # Mount a Render Persistent Disk here (for Docker image WORKDIR=/app):
    # APP_UPLOAD_DIR=/app/uploads
    dir: ${APP_UPLOAD_DIR:uploads}

