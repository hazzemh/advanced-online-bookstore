spring:
  datasource:
    url: jdbc:h2:mem:bookstore_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  session:
    store-type: none
  cache:
    type: simple

jwt:
  secret: testSecretKeyForJWTWhichShouldBeLongEnoughToBeSecure
  expiration: 86400000

