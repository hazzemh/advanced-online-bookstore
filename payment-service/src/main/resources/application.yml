server:
  # Render injects PORT. Keep SERVER_PORT for local/docker-compose.
  port: ${PORT:${SERVER_PORT:8082}}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/bookstore_payment_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  currency: ${STRIPE_CURRENCY:aed}

jwt:
  secret: ${JWT_SECRET:change-me}

order-service:
  base-url: ${ORDER_SERVICE_BASE_URL:http://localhost:8081}

internal:
  api:
    token: ${INTERNAL_API_TOKEN:change-me}

