services:
  postgres:
    image: postgres:16
    container_name: bookstore-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookstore_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bookstore_db}"]
      interval: 5s
      timeout: 3s
      retries: 20

  payment-postgres:
    image: postgres:16
    container_name: bookstore-payment-postgres
    environment:
      POSTGRES_DB: ${PAYMENT_POSTGRES_DB:-bookstore_payment_db}
      POSTGRES_USER: ${PAYMENT_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${PAYMENT_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${PAYMENT_POSTGRES_PORT:-5433}:5432"
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_POSTGRES_USER:-postgres} -d ${PAYMENT_POSTGRES_DB:-bookstore_payment_db}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: bookstore-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookstore-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8081}:8081"
    environment:
      SERVER_PORT: 8081

      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bookstore_db}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}

      CACHE_TYPE: ${CACHE_TYPE:-redis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: 6379
      CACHE_REDIS_TTL: ${CACHE_REDIS_TTL:-10m}

      # Required: JWT secret must be long enough for HS256 (>= 32 bytes recommended).
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}

      # Internal service-to-service authentication
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: bookstore-payment-service
    depends_on:
      payment-postgres:
        condition: service_healthy
      app:
        condition: service_started
    ports:
      - "${PAYMENT_SERVER_PORT:-8082}:8082"
    environment:
      SERVER_PORT: 8082

      DB_URL: jdbc:postgresql://payment-postgres:5432/${PAYMENT_POSTGRES_DB:-bookstore_payment_db}
      DB_USERNAME: ${PAYMENT_POSTGRES_USER:-postgres}
      DB_PASSWORD: ${PAYMENT_POSTGRES_PASSWORD:-postgres}

      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}

      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}

      JWT_SECRET: ${JWT_SECRET}

      ORDER_SERVICE_BASE_URL: http://app:8081
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}

volumes:
  postgres_data:
  payment_postgres_data:
